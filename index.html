<!DOCTYPE html>

<html>
    <head>
        <title>Calc is Slang</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="calculator">
            <div class="output">
            </div>
            <div class="input">
                <div class="top-row">
                    <div class="clear"></div>
                    <div class="backspace"></div>
                </div>
                <div class="middle">
                    <div class="numbers">
                        <div class="one"></div>
                        <div class="two"></div>
                        <div class="three"></div>
                        <div class="four"></div>
                        <div class="five"></div>
                        <div class="six"></div>
                        <div class="seven"></div>
                        <div class="eight"></div>
                        <div class="nine"></div>
                    </div>
                    <div class="operators">
                        <div class="add"></div>
                        <div class="subtract"></div>
                        <div class="multiply"></div>
                        <div class="divide"></div>
                    </div>
                </div>
                <div class="bottom-row">
                    <div class="zero"></div>
                    <div class="decimal"></div>
                    <div class="equal"></div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
