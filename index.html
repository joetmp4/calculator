<!DOCTYPE html>

<html>
    <head>
        <title>Calc is Slang</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>CalcYouLaTour</h1>
        <div class="calculator">
            <div class="output">
            </div>
            <div class="input">
                <div class="top">
                    <div class="left">
                        <div class="top-row">
                            <div class="clear">clear</div>
                            <div class="backspace">backspace</div>
                        </div>
                        <div class="numbers">
                            <div>7</div>
                            <div>8</div>
                            <div>9</div>
                            <div>4</div>
                            <div>5</div>
                            <div>6</div>
                            <div>1</div>
                            <div>2</div>
                            <div>3</div>
                        </div>
                    </div>
                    <div class="right">
                        <div class="add">+</div>
                        <div class="subtract">-</div>
                        <div class="multiply">*</div>
                        <div class="divide">/</div>
                    </div>
                </div>
                <div class="bottom">
                    <div class="zero">0</div>
                    <div class="decimal">.</div>
                    <div class="equal">=</div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
